<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research ToDo Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        :root { --main-bg: #f5f5f7; --card-bg: #ffffff; --accent: #007aff; }
        body { font-family: -apple-system, sans-serif; background: var(--main-bg); margin: 0; padding: 20px; color: #333; }
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #main-content { display: none; max-width: 1000px; margin: 0 auto; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
        .list-card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); align-self: start; }
        .todo-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .todo-main { display: flex; align-items: flex-start; gap: 10px; }
        .todo-item.done .task-text-display { text-decoration: line-through; color: #888; }
        .memo-area { margin: 10px 0 0 30px; background: #f9f9f9; padding: 8px; border-radius: 6px; font-size: 0.9em; border-left: 3px solid var(--accent); }
        .memo-content-display { cursor: pointer; min-height: 1em; }
        .memo-edit { width: 100%; box-sizing: border-box; font-family: monospace; padding: 5px; margin-top: 5px; }
        .input-group { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; background: #fff; padding: 15px; border-radius: 12px; }
        input, button, textarea { border-radius: 6px; border: 1px solid #ccc; padding: 8px; }
        button { background: var(--accent); color: white; border: none; cursor: pointer; }
        .date-edit, .time-edit, .label-edit { font-size: 0.8em; padding: 2px 4px; border: 1px solid #ddd; border-radius: 4px; background: #f9f9f9; color: #333; margin-right: 5px; }
        .archive-section { grid-column: 1 / -1; margin-top: 30px; border-top: 1px solid #ccc; padding-top: 10px; }
        .archive-item { font-size: 0.85em; color: #777; padding: 6px 0; border-bottom: 1px dashed #ddd; }
        .bulk-delete-bar { text-align: right; margin-bottom: 15px; padding: 10px; background: #fff; border-radius: 6px; font-size: 0.9em; box-shadow: inset 0 0 5px rgba(0,0,0,0.05); }
        .task-title-edit { font-family: inherit; font-size: 1em; padding: 2px 5px; border: 1px solid var(--accent); border-radius: 4px; }
        
        .label-chip { background: #e5e5ea; color: #333; border-radius: 10px; padding: 2px 8px; font-size: 0.75em; margin-right: 4px; display: inline-block; font-weight: 500; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; padding: 10px; background: #fff; border-radius: 8px; align-items: center; }
        .filter-btn { background: #f0f0f0; color: #555; border: none; padding: 5px 12px; border-radius: 15px; font-size: 0.85em; cursor: pointer; transition: all 0.2s; }
        .filter-btn:hover { background: #e0e0e0; }
        .filter-btn.active { background: var(--accent); color: white; font-weight: bold; }
        .filter-label-text { font-size: 0.9em; font-weight: bold; color: #666; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h2>Research Task Manager</h2>
        <input type="password" id="pass-input" placeholder="パスワードを入力">
        <button onclick="checkPass()" style="margin-top:10px">ログイン</button>
    </div>

    <div id="main-content">
        <h1>Research Tasks</h1>
        
        <div class="input-group">
            <input type="text" id="new-task-title" placeholder="タスク内容 (例: $E=mc^2$)" style="flex:3">
            <input type="date" id="new-task-date" style="flex:1" title="日付">
            <input type="time" id="new-task-time" style="flex:1" title="時間">
            <input type="text" id="new-task-labels" placeholder="ラベル(例: 論文, 実験)" style="flex:1.5">
            <button onclick="addTask()">追加</button>
        </div>

        <div id="filter-container" class="filter-bar" style="display:none;"></div>

        <div class="container">
            <div class="list-card">
                <h3>📅 スケジュール済み</h3>
                <div id="scheduled-list"></div>
            </div>
            <div class="list-card">
                <h3>📥 保留（Backlog）</h3>
                <div id="backlog-list"></div>
            </div>
            
            <div class="archive-section">
                <h4 onclick="toggleArchive()" style="cursor:pointer">📦 アーカイブ済みタスク (クリックで開閉)</h4>
                <div id="archive-wrap" style="display:none">
                    <div class="bulk-delete-bar">
                        <label>期間を指定して一括整理: </label>
                        <input type="month" id="archive-delete-month">
                        <button onclick="bulkDeleteArchive()" style="background: #ff3b30; color: white; border: none; border-radius: 4px; padding: 4px 8px; margin-left: 5px; cursor: pointer;">以前の項目を削除</button>
                    </div>
                    <div id="archive-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjnlxV-O5KXmTPlNRmyYIngygjyjvWSEY",
            authDomain: "my-research-todo.firebaseapp.com",
            projectId: "my-research-todo",
            storageBucket: "my-research-todo.firebasestorage.app",
            messagingSenderId: "23018762664",
            appId: "1:23018762664:web:7aa9046b27f18181d5ed9d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userDocId = "my-research-tasks";

        window.tasks = [];
        window.currentFilter = null; 

        async function loadData() {
            try {
                const docRef = doc(db, "todo_lists", userDocId);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    window.tasks = docSnap.data().tasks || [];
                    render(false); 
                }
            } catch (e) {
                console.error("データの読み込みに失敗しました:", e);
            }
        }

        window.saveToCloud = async function() {
            try {
                await setDoc(doc(db, "todo_lists", userDocId), { tasks: window.tasks, updatedAt: new Date() });
            } catch (e) {
                console.error("保存に失敗しました:", e);
            }
        };

        window.checkPass = function() {
            const pass = document.getElementById('pass-input').value;
            if (pass === "lab123") { 
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else { alert("Wrong password"); }
        };

        window.addTask = function() {
            const title = document.getElementById('new-task-title').value;
            const date = document.getElementById('new-task-date').value;
            const time = document.getElementById('new-task-time').value;
            const labelsInput = document.getElementById('new-task-labels').value;
            
            if (!title) return;

            const labels = labelsInput.split(',').map(l => l.trim()).filter(l => l);

            window.tasks.push({
                id: Date.now(), title, memo: "", date, time: time || "", labels: labels,
                isBacklog: date === "", done: false, showMemo: false, isArchived: false
            });
            render(); 
            
            document.getElementById('new-task-title').value = "";
            document.getElementById('new-task-time').value = "";
            document.getElementById('new-task-labels').value = "";
        };

        window.toggleTask = function(id) { const task = window.tasks.find(t => t.id === id); if(task) { task.done = !task.done; render(); } };
        window.updateTitle = function(id, newTitle) { const task = window.tasks.find(t => t.id === id); if (task && newTitle.trim() !== "") { task.title = newTitle; render(); } };
        window.updateDate = function(id, newDate) { const task = window.tasks.find(t => t.id === id); if(task) { task.date = newDate; task.isBacklog = (newDate === ""); render(); } };
        window.updateTime = function(id, newTime) { const task = window.tasks.find(t => t.id === id); if(task) { task.time = newTime; render(); } };
        
        // 【新規】日時をクリアして強制的に保留に戻す関数
        window.clearDateTime = function(id) {
            const task = window.tasks.find(t => t.id === id);
            if(task) {
                task.date = "";
                task.time = "";
                task.isBacklog = true;
                render();
            }
        };

        window.archiveTask = function(id) { const task = window.tasks.find(t => t.id === id); if(task) { task.isArchived = true; render(); } };
        window.toggleMemoView = function(id) { const task = window.tasks.find(t => t.id === id); if(task) { task.showMemo = !task.showMemo; render(); } };
        window.saveMemo = function(id, newText) { const task = window.tasks.find(t => t.id === id); if(task) { task.memo = newText; render(); } };
        window.toggleArchive = function() { const el = document.getElementById('archive-wrap'); el.style.display = (el.style.display === 'none') ? 'block' : 'none'; };
        window.unarchiveTask = function(id) { const task = window.tasks.find(t => t.id === id); if(task) { task.isArchived = false; render(); } };
        window.deleteTask = function(id) { if (confirm("このタスクを完全に削除しますか？")) { window.tasks = window.tasks.filter(t => t.id !== id); render(); } };
        window.updateLabels = function(id, labelsString) { const task = window.tasks.find(t => t.id === id); if(task) { task.labels = labelsString.split(',').map(l => l.trim()).filter(l => l); render(); } };
        window.setFilter = function(label) { window.currentFilter = (window.currentFilter === label) ? null : label; render(false); };

        window.bulkDeleteArchive = function() {
            const monthInput = document.getElementById('archive-delete-month').value; 
            if (!monthInput) { alert("削除する期間（年月）を指定してください。"); return; }
            if (confirm(`${monthInput} 以前のアーカイブ済みタスクをすべて削除しますか？`)) {
                window.tasks = window.tasks.filter(task => {
                    if (!task.isArchived || !task.date) return true; 
                    return task.date.substring(0, 7) > monthInput; 
                });
                render();
            }
        };

        window.render = function(shouldSave = true) {
            const scheduledDiv = document.getElementById('scheduled-list');
            const backlogDiv = document.getElementById('backlog-list');
            const archiveDiv = document.getElementById('archive-list');
            const filterContainer = document.getElementById('filter-container');
    
            scheduledDiv.innerHTML = ""; 
            backlogDiv.innerHTML = ""; 
            archiveDiv.innerHTML = "";
            filterContainer.innerHTML = "";

            window.tasks.sort((a, b) => {
                if (!a.date && !b.date) return b.id - a.id; 
                if (!a.date) return 1;  
                if (!b.date) return -1; 
                
                if (a.date !== b.date) return a.date.localeCompare(b.date);
                
                const timeA = a.time || "23:59";
                const timeB = b.time || "23:59";
                return timeA.localeCompare(timeB);
            });

            const allLabels = new Set();
            window.tasks.forEach(t => { if (t.labels) t.labels.forEach(l => allLabels.add(l)); });
            
            if (allLabels.size > 0) {
                filterContainer.style.display = "flex";
                filterContainer.innerHTML = `<span class="filter-label-text">🏷️ ラベルで絞り込み:</span>`;
                
                const allBtn = document.createElement('button');
                allBtn.className = `filter-btn ${window.currentFilter === null ? 'active' : ''}`;
                allBtn.innerText = "すべて表示";
                allBtn.onclick = () => setFilter(null);
                filterContainer.appendChild(allBtn);

                allLabels.forEach(label => {
                    const btn = document.createElement('button');
                    btn.className = `filter-btn ${window.currentFilter === label ? 'active' : ''}`;
                    btn.innerText = label;
                    btn.onclick = () => setFilter(label);
                    filterContainer.appendChild(btn);
                });
            } else {
                filterContainer.style.display = "none";
                window.currentFilter = null; 
            }

            window.tasks.forEach(task => {
                const taskLabels = task.labels || [];
                
                if (window.currentFilter && !taskLabels.includes(window.currentFilter)) {
                    return;
                }

                const safeTitle = task.title.replace(/"/g, '&quot;');
                const safeLabels = taskLabels.join(', ').replace(/"/g, '&quot;');
                const labelHTML = taskLabels.map(l => `<span class="label-chip">${l}</span>`).join('');

                if (task.isArchived) {
                    const archItem = document.createElement('div');
                    archItem.className = "archive-item";
                    archItem.style.display = "flex";
                    archItem.style.justifyContent = "space-between";
                    archItem.style.alignItems = "center";
                    archItem.innerHTML = `
                        <span>✓ ${task.title} <small>(${task.date || '保留'} ${task.time || ''})</small> ${labelHTML}</span>
                        <div>
                            <button onclick="unarchiveTask(${task.id})" style="background:#e5e5ea; color:#333; font-size:10px; padding:2px 5px; margin-right:5px; border:none; border-radius:4px; cursor:pointer;">↩️ 戻す</button>
                            <button onclick="deleteTask(${task.id})" style="background:none; border:none; cursor:pointer;" title="完全に削除">🗑️</button>
                        </div>
                    `;
                    archiveDiv.appendChild(archItem);
                    return; 
                }

                const item = document.createElement('div');
                item.className = `todo-item ${task.done ? 'done' : ''}`;
                
                // 【変更箇所】日時の右隣にクリア用ボタンを配置しました
                item.innerHTML = `
                    <div class="todo-main">
                        <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${task.id})">
                        <div style="flex:1; overflow:hidden;">
                            <div class="task-text-display" onclick="this.style.display='none'; this.nextElementSibling.style.display='block'; this.nextElementSibling.focus();" style="cursor:text; min-height:1.2em;" title="クリックして編集">${task.title}</div>
                            <input type="text" class="task-title-edit" value="${safeTitle}" style="display:none; width:95%;" onblur="updateTitle(${task.id}, this.value)" onkeydown="if(event.key==='Enter') {this.blur();}">
                            
                            <div style="margin-top: 4px; display:flex; align-items:center; flex-wrap:wrap; gap:4px;">
                                <input type="date" class="date-edit" value="${task.date}" onchange="updateDate(${task.id}, this.value)">
                                <input type="time" class="time-edit" value="${task.time || ''}" onchange="updateTime(${task.id}, this.value)">
                                
                                ${!task.isBacklog ? `<button onclick="clearDateTime(${task.id})" style="background:#ffebee; color:#c62828; border:none; border-radius:4px; padding:2px 6px; font-size:0.75em; cursor:pointer; margin-right:5px;" title="日時を消去して保留に戻す">✖️</button>` : ''}
                                
                                <div style="display:inline-flex; align-items:center;">
                                    ${labelHTML}
                                    <input type="text" class="label-edit" style="width:100px;" placeholder="ラベル追加..." value="${safeLabels}" title="カンマ区切りで入力" onblur="updateLabels(${task.id}, this.value)" onkeydown="if(event.key==='Enter') {this.blur();}">
                                </div>
                            </div>
                            
                            <button class="memo-toggle" style="background:none;color:var(--accent);border:none;font-size:0.8em;padding:0;text-decoration:underline;cursor:pointer;margin-top:4px;" onclick="toggleMemoView(${task.id})">
                                ${task.memo ? '📝 メモ表示' : '+ メモ追加'}
                            </button>
                        </div>
                        <div style="display:flex; align-items:center;">
                            ${task.done ? `<button onclick="archiveTask(${task.id})" style="background:#eee;color:#333;font-size:12px;padding:4px 8px;margin-right:5px;border:none;border-radius:4px;cursor:pointer;">📦</button>` : ''}
                            <button onclick="deleteTask(${task.id})" style="background:none; border:none; font-size:1.2em; cursor:pointer;" title="完全に削除">🗑️</button>
                        </div>
                    </div>
                    <div class="memo-area" id="memo-${task.id}" style="display: ${task.showMemo ? 'block' : 'none'}">
                        <div class="memo-content-display" onclick="this.nextElementSibling.style.display='block';this.style.display='none';this.nextElementSibling.nextElementSibling.style.display='block'">${task.memo || 'クリックしてメモを入力'}</div>
                        <textarea class="memo-edit" style="display:none" rows="3">${task.memo}</textarea>
                        <button style="display:none;margin-top:5px;font-size:10px;background:var(--accent);color:white;border:none;border-radius:4px;padding:4px 8px;cursor:pointer;" onclick="saveMemo(${task.id}, this.previousElementSibling.value)">保存</button>
                    </div>
                `;

                if (task.isBacklog) { 
                    backlogDiv.appendChild(item); 
                } else { 
                    scheduledDiv.appendChild(item); 
                }
            });

            document.querySelectorAll('.task-text-display, .memo-content-display, .archive-item span, .label-chip').forEach(el => {
                el.innerHTML = el.innerHTML.replace(/\$(.*?)\$/g, (match, formula) => {
                    return katex.renderToString(formula, { throwOnError: false });
                });
            });

            if (shouldSave && typeof window.saveToCloud === "function") {
                window.saveToCloud();
            }
        };

        loadData();

    </script>
</body>
</html>
